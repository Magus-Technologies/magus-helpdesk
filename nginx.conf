# ============================================================
# MAGUS HELP DESK - Nginx (snippet de locations)
# ============================================================
# IMPORTANTE: este archivo NO se copia tal cual a /etc/nginx/conf.d/
# Su contenido se debe AÑADIR DENTRO del server block existente del
# servidor (ej: /etc/nginx/conf.d/api-sunat.conf), junto a los demás
# proyectos: /credigo, /api-sunat-laravel, /mecanica, etc.
#
# Acceso: http://84.247.162.204/helpdesk/
# ============================================================

# --- PROYECTO: MAGUS HELP DESK (Node.js + React SPA) ---

# Redirección si entran sin barra final
location = /helpdesk {
    return 301 /helpdesk/;
}

# API REST → Node.js backend (puerto 4000)
location /helpdesk/api/ {
    proxy_pass         http://127.0.0.1:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    client_max_body_size 15M;
}

# Health check
location = /helpdesk/health {
    proxy_pass http://127.0.0.1:4000/health;
}

# Socket.io (tiempo real / websockets)
location /helpdesk/socket.io/ {
    proxy_pass         http://127.0.0.1:4000/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
    proxy_read_timeout 300s;
}

# Uploads de usuarios (sirve archivos del backend Node)
location /helpdesk/uploads/ {
    proxy_pass http://127.0.0.1:4000/uploads/;
    expires 30d;
    add_header Cache-Control "public, immutable";
}

# Frontend (React SPA) - sirve index.html y assets compilados por Vite
location /helpdesk/ {
    alias /usr/share/nginx/html/magus-helpdesk/backend/public/;
    try_files $uri $uri/ /helpdesk/index.html;

    # Cache largo para assets con hash en el nombre
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ============================================================
# CÓMO INSTALAR ESTE SNIPPET
# ============================================================
# 1) Edita el archivo donde tienes los demás proyectos:
#    sudo nano /etc/nginx/conf.d/api-sunat.conf
#
# 2) Pega TODO este bloque (desde "--- PROYECTO: MAGUS HELP DESK ---"
#    hasta antes de este comentario) DENTRO del server { ... } existente,
#    junto a las locations de /credigo, /mecanica, etc.
#
# 3) Valida y recarga:
#    sudo nginx -t
#    sudo systemctl reload nginx
#
# 4) Abre en navegador: http://84.247.162.204/helpdesk/
# ============================================================
