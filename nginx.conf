# ============================================================
# MAGUS HELP DESK - Nginx config
# Servidor: AlmaLinux 9 (rutas /usr/share/nginx/html/...)
# Acceso: por IP del servidor (HTTP). SSL pendiente (ver final).
# ============================================================

server {
    listen 80;
    listen [::]:80;

    # Cambiar a tu dominio cuando lo tengas (ej: magus-ecommerce.com www.magus-ecommerce.com)
    server_name 84.247.162.204;

    root /usr/share/nginx/html/magus-helpdesk/backend/public;
    index index.html;

    # Tamaño máximo de uploads
    client_max_body_size 15M;

    # Logs
    access_log /var/log/nginx/magus-helpdesk.access.log;
    error_log  /var/log/nginx/magus-helpdesk.error.log;

    # API REST → Node.js backend
    location /api {
        proxy_pass         http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }

    # Socket.io (tiempo real)
    location /socket.io {
        proxy_pass         http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
    }

    # Uploads de usuarios → backend (Node los sirve desde /uploads)
    location /uploads {
        proxy_pass http://localhost:4000;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Health check
    location /health {
        proxy_pass http://localhost:4000;
    }

    # Cache de assets estáticos del frontend (debe ir ANTES del location /)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: React Router
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Cabeceras de seguridad básicas
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}

# ============================================================
# CUANDO TENGAS DOMINIO + SSL (futuro)
# 1) Apunta tu dominio (DNS A) a 84.247.162.204
# 2) Cambia "server_name 84.247.162.204;" arriba por "server_name tu-dominio.com www.tu-dominio.com;"
# 3) Recarga: sudo nginx -t && sudo systemctl reload nginx
# 4) Genera SSL:  sudo dnf install -y certbot python3-certbot-nginx
#                 sudo certbot --nginx -d tu-dominio.com -d www.tu-dominio.com
# 5) Certbot edita este archivo automáticamente para añadir HTTPS y redirección.
# ============================================================
